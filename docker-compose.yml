name: mempalace

# ── Startup order ────────────────────────────────────────────────────────────
# db (healthy) ─► app

services:

  # --------------------------------------------------------------------------
  # PostgreSQL 16 with pgvector + Apache AGE
  # --------------------------------------------------------------------------
  db:
    build: ./k8s/postgres
    # Pass shared_preload_libraries via command flag — most reliable across
    # image versions. AGE requires it; pgvector does not.
    command: ["postgres", "-c", "shared_preload_libraries=age"]
    environment:
      POSTGRES_DB:       mempalace
      POSTGRES_USER:     mempalace
      POSTGRES_PASSWORD: mempalace_local
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mempalace -d mempalace"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # MemPalace Go server
  # --------------------------------------------------------------------------
  app:
    build: ./server
    ports:
      - "8000:8000"
    # Make `host.docker.internal` resolve on native Linux Docker too (it is
    # built in on macOS / Windows). Without this the default EMBED_API_URL
    # below cannot reach an Ollama server running on the host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Database
      MEMPALACE_DB_URL:     "postgres://mempalace:mempalace_local@db:5432/mempalace"
      # ⚠️  Change this key before exposing the port externally
      # MCP_API_KEY grants full access (read + write).
      MCP_API_KEY:          "local-dev-key-change-me"
      # Optional read-only key — its holders may only read, never mutate.
      # Must differ from MCP_API_KEY. Leave empty to disable.
      MCP_API_KEY_READONLY: ""
      # Embedding — external Ollama server
      # embeddinggemma: multilingual (100+ languages), native 768 dims.
      # EMBED_DIM must equal the model's output; cannot exceed it.
      # embeddinggemma supports Matryoshka truncation DOWN to 512 / 256 / 128
      # (smaller = faster & less storage, slightly lower quality). Not larger.
      EMBED_API_URL:        "http://host.docker.internal:11434/v1"
      EMBED_MODEL:          "embeddinggemma"
      EMBED_DIM:            "768"
      # Optional plain REST/JSON API at /mp/api/v1 (MCP is always on).
      # Set to "true" to enable. Uses the same MCP_API_KEY for auth.
      ENABLE_REST_API:      "true"
      # Multi-tenancy
      MEMPALACE_TENANT_ID:  "default"
      # Tuning
      MEMPALACE_HNSW_EF_SEARCH: "100"
      MEMPALACE_PG_POOL_MIN:    "2"
      MEMPALACE_PG_POOL_MAX:    "10"
      # Knowledge-graph auto-population (opt-in, off by default).
      # When "true", add_drawer also writes to the AGE entity graph.
      # MEMPALACE_GRAPH_AUTO_POPULATE: "true"
      # Strategy: "structural" (deterministic, no LLM — links
      # drawer→room→wing) or "llm" (extracts entities/relations from content).
      # MEMPALACE_GRAPH_EXTRACTOR: "structural"
      # LLM extraction — only used when MEMPALACE_GRAPH_EXTRACTOR=llm.
      # Any OpenAI-compatible chat endpoint (Ollama, LM Studio, OpenAI, …).
      # LLM_API_URL: "http://host.docker.internal:11434/v1"
      # LLM_API_KEY: ""
      # LLM_MODEL:   "llama3.1"
      # Room redirects (opt-in, off by default). When "true", exposes the
      # redirect tools and makes add_drawer/search/list_drawers transparently
      # follow a merged/renamed room to its canonical target. See ROOM_REDIRECTS.md.
      # MEMPALACE_ROOM_REDIRECTS: "true"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # "Dream" consolidation job — its own container, runs to completion.
  # Not started by `docker compose up` (guarded by a profile). Run on demand:
  #   docker compose run --rm dreamjob
  # It scans rooms and writes near-duplicate merge PROPOSALS; review them via
  # the MCP mempalace_list_merge_candidates tool. See ROOM_REDIRECTS.md.
  # --------------------------------------------------------------------------
  dreamjob:
    build:
      context: ./server
      dockerfile: Dockerfile.dreamjob
    profiles: ["dream"]           # only runs when explicitly invoked
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MEMPALACE_DB_URL:     "postgres://mempalace:mempalace_local@db:5432/mempalace"
      MEMPALACE_TENANT_ID:  "default"
      EMBED_API_URL:        "http://host.docker.internal:11434/v1"
      EMBED_MODEL:          "embeddinggemma"
      EMBED_DIM:            "768"
      # Semantic tier (embedding similarity). Set "false" for exact-name only.
      MEMPALACE_DREAM_SEMANTIC:  "true"
      MEMPALACE_DREAM_THRESHOLD: "0.88"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"                 # batch job — run once, don't restart

volumes:
  pgdata:
